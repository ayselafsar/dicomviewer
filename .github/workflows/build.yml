name: Build

on:
  pull_request:
  push:
    branches:
      - master
      - stable*

env:
  APP_NAME: dicomviewer

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      # do not stop on another job's failure
      fail-fast: false
      matrix:
        php-versions: ['8.2']
        server-versions: ['stable34']

    name: php${{ matrix.php-versions }}-${{ matrix.server-versions }}

    steps:
      - name: Use Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Checkout server
        uses: actions/checkout@v4
        with:
          repository: nextcloud/server
          submodules: 'recursive'
          ref: ${{ matrix.server-versions }}

      - name: Checkout app
        uses: actions/checkout@v4
        with:
          submodules: 'recursive'
          path: apps/${{ env.APP_NAME }}

      - name: Build
        working-directory: apps/${{ env.APP_NAME }}
        run: make

      - name: Set up php ${{ matrix.php-versions }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: "${{ matrix.php-versions }}"
          extensions: mbstring, iconv, fileinfo, intl, sqlite3
          tools: phpunit
          coverage: none

      - name: Set up Nextcloud
        run: |
          mkdir data
          ./occ maintenance:install --verbose --database sqlite --database-name oc_autotest --admin-user admin --admin-pass admin
          php -f index.php
          ./occ app:enable --force ${{ env.APP_NAME }}
